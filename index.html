    // Botón genérico interactivo
    function Button({ children, onClick, type = "button", variant = "primary", size = "md", className = "", disabled }) {
      const baseClasses = "inline-flex items-center justify-center font-semibold transition-all duration-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-offset-2 active:scale-95";
      
      const variants = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 shadow-md shadow-blue-200",
        secondary: "bg-slate-800 text-white hover:bg-slate-900 focus:ring-slate-500",
        outline: "border-2 border-slate-200 text-slate-700 hover:border-slate-300 hover:bg-slate-50 focus:ring-slate-500",
        danger: "bg-red-600 text-white hover:bg-red-700 focus:ring-red-500"
      };

      const sizes = {
        sm: "px-4 py-2 text-sm",
        md: "px-6 py-3 text-base",
        lg: "px-8 py-4 text-lg"
      };

      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`${baseClasses} ${variants[variant]} ${sizes[size]} ${className} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}
        >
          {children}
        </button>
      );
    }

    // Pantalla de Bienvenida (Welcome Screen)
    function WelcomeScreen({ onStart, onGetLicense }) {
      useEffect(() => {
        lucide.createIcons();
      }, []);

      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 animate-fade-in">
          <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div className="bg-blue-600 p-8 sm:p-12 text-center relative overflow-hidden">
              <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full opacity-35 -mr-10 -mt-10 blur-xl"></div>
              <div className="absolute bottom-0 left-0 w-32 h-32 bg-blue-700 rounded-full opacity-30 -ml-10 -mb-10 blur-xl"></div>
              <i data-lucide="shield-check" className="w-16 h-16 text-white mx-auto mb-6 drop-shadow-md"></i>
              <h1 className="text-3.5xl sm:text-5xl font-extrabold text-white tracking-tight mb-4 leading-tight">
                Simulador LibretaYA
              </h1>
              <p className="text-blue-100 text-lg sm:text-xl font-medium max-w-lg mx-auto">
                Prueba teórica oficial basada en la Guía Nacional de Conducción del Uruguay.
              </p>
            </div>

            <div className="p-8 sm:p-12">
              <div className="grid sm:grid-cols-2 gap-6 mb-10">
                <div className="flex items-start space-x-4">
                  <div className="bg-blue-100 p-3 rounded-full flex-shrink-0">
                    <i data-lucide="book-open" className="w-6 h-6 text-blue-600"></i>
                  </div>
                  <div>
                    <h3 className="font-semibold text-slate-900">30 Preguntas</h3>
                    <p className="text-slate-600 text-sm mt-1">Formato de múltiple opción con una sola respuesta correcta.</p>
                  </div>
                </div>
                
                <div className="flex items-start space-x-4">
                  <div className="bg-emerald-100 p-3 rounded-full flex-shrink-0">
                    <i data-lucide="shield-check" className="w-6 h-6 text-emerald-600"></i>
                  </div>
                  <div>
                    <h3 className="font-semibold text-slate-900">Aprobación</h3>
                    <p className="text-slate-600 text-sm mt-1">Podrá cometer un máximo de 5 errores para aprobar (25/30).</p>
                  </div>
                </div>
              </div>

              <div className="bg-slate-50 rounded-2xl p-6 mb-10 border border-slate-100 text-center">
                <i data-lucide="clock" className="w-8 h-8 text-slate-400 mx-auto mb-3 animate-bounce-subtle"></i>
                <p className="text-slate-600 font-medium">Tómese su tiempo, lea atentamente y recuerde que al finalizar podrá ver la corrección fundamentada en la normativa vial.</p>
              </div>

              <div className="flex justify-center">
                <Button size="lg" onClick={onStart} className="w-full sm:w-auto">
                  Comenzar Prueba
                </Button>
              </div>

              {/* Nueva sección: Promesa y conseguir libreta legal */}
              <div className="mt-8 pt-8 border-t border-slate-200 text-center animate-slide-up">
                <h3 className="text-xl font-bold text-slate-900 mb-2">
                  ¿Quieres asegurar tu Libreta de Conducir?
                </h3>
                <p className="text-slate-600 text-sm mb-6 max-w-md mx-auto">
                  Te garantizamos el material oficial y la gestión certificada para obtener tu libreta legal sin complicaciones y de forma rápida.
                </p>
                <Button 
                  size="lg" 
                  onClick={onGetLicense} 
                  className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white border-none focus:ring-emerald-500 shadow-md shadow-emerald-100"
                >
                  Conseguir mi libreta legal
                </Button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Pantalla de Preguntas (Quiz Screen)
    function QuizScreen({ question, currentIndex, totalQuestions, onAnswer, onSelectOption, selectedAnswer }) {
      useEffect(() => {
        lucide.createIcons();
      }, [question]);

      const handleSubmit = () => {
        if (selectedAnswer !== undefined) {
          onAnswer(selectedAnswer);
        }
      };

      const progress = ((currentIndex) / totalQuestions) * 100;

      return (
        <div className="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 flex flex-col justify-center items-center animate-fade-in">
          <div className="max-w-3xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            
            {/* Cabecera del Quiz */}
            <div className="px-8 pt-8 pb-4">
              <div className="flex justify-between items-center mb-4 text-sm font-semibold text-slate-500">
                <span>Pregunta {currentIndex + 1} de {totalQuestions}</span>
                <span>{Math.round(progress)}% Completado</span>
              </div>
              <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                <div 
                  className="bg-blue-600 h-full transition-all duration-300 rounded-full" 
                  style={{ width: `${progress}%` }}
                ></div>
              </div>
            </div>

            {/* Pregunta */}
            <div className="p-8">
              <h2 className="text-2xl font-bold text-slate-900 mb-8 leading-tight">
                {question.text}
              </h2>

              {/* Opciones */}
              <div className="space-y-4">
                {question.options.map((option, idx) => {
                  const isSelected = selectedAnswer === idx;
                  return (
                    <div 
                      key={idx}
                      onClick={() => onSelectOption(idx)}
                      className={`flex items-center p-5 rounded-2xl border-2 cursor-pointer transition-all duration-200 ${
                        isSelected 
                          ? 'border-blue-600 bg-blue-50/50 text-blue-900' 
                          : 'border-slate-100 hover:border-slate-200 hover:bg-slate-50/40 text-slate-700'
                      }`}
                    >
                      <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-4 transition-colors ${
                        isSelected ? 'border-blue-600 bg-blue-600' : 'border-slate-300'
                      }`}>
                        {isSelected && <div className="w-2.5 h-2.5 rounded-full bg-white"></div>}
                      </div>
                      <span className="font-semibold text-md leading-relaxed">{option}</span>
                    </div>
                  );
                })}
              </div>

              {/* Botón de Siguiente */}
              <div className="mt-8 flex justify-end">
                <Button 
                  onClick={handleSubmit} 
                  disabled={selectedAnswer === undefined}
                  className="w-full sm:w-auto px-10 py-4"
                >
                  <span>Siguiente Pregunta</span>
                  <i data-lucide="arrow-right" className="ml-2 w-5 h-5"></i>
                </Button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Formulario de Pago y Registro (Checkout Form)
    function CheckoutForm({ onSuccess, onCancel }) {
      const [formData, setFormData] = useState({
        name: '',
        email: '',
        document: '',
        phone: '',
      });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        lucide.createIcons();
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);

        const googleScriptUrl = CONFIG.GOOGLE_SCRIPT_URL;
        const mercadoPagoLink = CONFIG.MERCADO_PAGO_URL;

        try {
          if (googleScriptUrl) {
            // Guardamos los datos del cliente en Google Sheets utilizando el script
            await fetch(googleScriptUrl, {
              method: 'POST',
              mode: 'no-cors',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                ...formData,
                timestamp: new Date().toISOString(),
              }),
            });
          } else {
            console.warn('URL de Google Apps Script no configurada. Datos ingresados:', formData);
          }

          // Redirigimos al checkout de Mercado Pago
          onSuccess(mercadoPagoLink);
        } catch (err) {
          console.error('Error al enviar los datos a Google Sheets:', err);
          // Redirigimos al link de pago para no obstaculizar la transacción
          onSuccess(mercadoPagoLink);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-lg w-full animate-slide-up border border-slate-100">
          <div className="bg-blue-600 p-8 text-center text-white relative">
            <h2 className="text-2.5xl font-bold mb-2">¡Consigue tu Libreta Legal!</h2>
            <p className="text-blue-100">Completa tus datos para registrar tu solicitud y proceder al pago.</p>
          </div>

          <form onSubmit={handleSubmit} className="p-8 space-y-6">
            {error && (
              <div className="bg-red-50 text-red-700 p-4 rounded-xl text-sm font-medium border border-red-200">
                {error}
              </div>
            )}

            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-2">Nombre completo</label>
              <div className="relative">
                <i data-lucide="user" className="absolute left-3 top-3.5 h-5 w-5 text-slate-400"></i>
                <input
                  type="text"
                  required
                  className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all"
                  placeholder="Juan Pérez"
                  value={formData.name}
                  onChange={(e) => setFormData(prev => ({ ...prev, name: e.target.value }))}
                />
              </div>
            </div>

            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-2">Correo electrónico</label>
              <div className="relative">
                <i data-lucide="mail" className="absolute left-3 top-3.5 h-5 w-5 text-slate-400"></i>
                <input
                  type="email"
                  required
                  className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all"
                  placeholder="juan@ejemplo.com"
                  value={formData.email}
                  onChange={(e) => setFormData(prev => ({ ...prev, email: e.target.value }))}
                />
              </div>
            </div>

            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-2">Cédula de Identidad</label>
              <div className="relative">
                <i data-lucide="credit-card" className="absolute left-3 top-3.5 h-5 w-5 text-slate-400"></i>
                <input
                  type="text"
                  required
                  className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all"
                  placeholder="1234567-8"
                  value={formData.document}
                  onChange={(e) => setFormData(prev => ({ ...prev, document: e.target.value }))}
                />
              </div>
            </div>

            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-2">Teléfono de contacto</label>
              <div className="relative">
                <i data-lucide="phone" className="absolute left-3 top-3.5 h-5 w-5 text-slate-400"></i>
                <input
                  type="tel"
                  required
                  className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all"
                  placeholder="099 123 456"
                  value={formData.phone}
                  onChange={(e) => setFormData(prev => ({ ...prev, phone: e.target.value }))}
                />
              </div>
            </div>

            <div className="pt-4 flex flex-col gap-3">
              <Button type="submit" size="lg" className="w-full relative py-4" disabled={loading}>
                {loading ? (
                  <span className="flex items-center justify-center gap-2">
                    <i data-lucide="loader" className="w-6 h-6 animate-spin"></i> Procesando...
                  </span>
                ) : (
                  <span className="flex items-center justify-center gap-2 text-lg">
                    Pagar ahora <i data-lucide="arrow-right" className="w-5 h-5"></i>
                  </span>
                )}
              </Button>
              <button 
                type="button" 
                onClick={onCancel}
                className="text-slate-500 hover:text-slate-700 text-sm font-semibold py-2 transition-colors"
              >
                Cancelar
              </button>
            </div>
          </form>
        </div>
      );
    }

    // Pantalla de Resultados (Results Screen)
    function ResultsScreen({ questions, answers, onRestart }) {
      const [showCheckout, setShowCheckout] = useState(false);

      useEffect(() => {
        lucide.createIcons();
      }, [showCheckout]);

      let correctCount = 0;
      questions.forEach(q => {
        if (answers[q.id] === q.correctOptionIndex) correctCount++;
      });

      const errorCount = questions.length - correctCount;
      const isApproved = errorCount <= 5;

      const handleCheckoutSuccess = (paymentLink) => {
        window.location.href = paymentLink;
      };

      return (
        <div className="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 animate-fade-in">
          <div className="max-w-4xl mx-auto flex flex-col items-center">
            
            {/* Tarjeta de Calificación */}
            <div className="bg-white rounded-3xl shadow-xl overflow-hidden mb-8 text-center w-full border border-slate-100">
              <div className={`p-10 ${isApproved ? 'bg-emerald-600' : 'bg-red-600'} text-white`}>
                <i 
                  data-lucide={isApproved ? "check-circle-2" : "x-circle"} 
                  className="w-20 h-20 text-white mx-auto mb-4 drop-shadow-md"
                ></i>
                <h1 className="text-4xl font-black mb-2 tracking-tight">
                  {isApproved ? '¡EXAMEN APROBADO!' : 'EXAMEN REPROBADO'}
                </h1>
                <p className="text-white/95 text-lg font-medium">
                  {errorCount} {errorCount === 1 ? 'error cometido' : 'errores cometidos'} (Máximo permitido: 5)
                </p>
              </div>
              
              <div className="p-8">
                <div className="grid grid-cols-2 gap-4 max-w-lg mx-auto mb-8">
                  <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                    <div className="text-4xl font-extrabold text-slate-800 mb-1">{correctCount}</div>
                    <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Aciertos</div>
                  </div>
                  <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                    <div className="text-4xl font-extrabold text-slate-800 mb-1">{errorCount}</div>
                    <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Errores</div>
                  </div>
                </div>

                <Button onClick={onRestart} size="lg" variant="outline" className="gap-2">
                  <i data-lucide="refresh-ccw" className="w-5 h-5"></i> Renovar Intento
                </Button>
              </div>
            </div>

            {/* Banner de Obtención de la Libreta */}
            {isApproved && !showCheckout && (
              <div className="w-full max-w-lg mb-12 text-center bg-blue-50 border-2 border-blue-200 rounded-3xl p-8 animate-slide-up">
                <i data-lucide="file-check-2" className="w-16 h-16 text-blue-600 mx-auto mb-4"></i>
                <h2 className="text-2xl font-bold text-blue-900 mb-2">¡Estás listo para obtener tu libreta!</h2>
                <p className="text-blue-800 mb-6 font-medium">Continúa con el trámite para conseguir tu Libreta de conducir legal rápidamente.</p>
                <Button 
                  size="lg" 
                  className="w-full text-lg py-4 bg-emerald-600 hover:bg-emerald-700 text-white shadow-lg shadow-emerald-100 border-none" 
                  onClick={() => setShowCheckout(true)}
                >
                  Conseguir mi libreta legal
                </Button>
              </div>
            )}

            {/* Formulario Checkout en línea */}
            {showCheckout && (
              <CheckoutForm 
                onSuccess={handleCheckoutSuccess} 
                onCancel={() => setShowCheckout(false)} 
              />
            )}

            {/* Revisión de Fallos */}
            {errorCount > 0 && (
              <div className="mb-10 mt-6 text-center">
                <h2 className="text-2.5xl font-bold text-slate-800 flex items-center justify-center gap-3">
                  <i data-lucide="alert-triangle" className="text-amber-500"></i> Revisión de Errores
                </h2>
                <p className="text-slate-500 mt-2 font-medium">Revise a continuación la fundamentación normativa de sus fallos.</p>
              </div>
            )}

            <div className="space-y-6 w-full">
              {questions.map((q, idx) => {
                const userAnswer = answers[q.id];
                const isCorrect = userAnswer === q.correctOptionIndex;
                
                if (isCorrect) return null; // Solo se muestran los fallos del estudiante

                return (
                  <div 
                    key={q.id} 
                    className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden w-full transition-shadow duration-200 hover:shadow-md"
                  >
                    <div className="p-6 sm:p-8">
                      <div className="flex gap-4 mb-6">
                        <div className="bg-red-100 p-2 rounded-full h-fit mt-1">
                          <i data-lucide="x-circle" className="w-6 h-6 text-red-600"></i>
                        </div>
                        <div>
                          <h3 className="text-xl font-bold text-slate-900 mb-2">Pregunta {idx + 1}</h3>
                          <p className="text-lg text-slate-700 leading-relaxed font-medium">{q.text}</p>
                        </div>
                      </div>

                      <div className="ml-0 sm:ml-14 space-y-4">
                        <div className="bg-red-50 border border-red-100 rounded-xl p-4">
                          <span className="text-xs font-bold text-red-800 uppercase tracking-wider block mb-1">Su respuesta</span>
                          <span className="text-red-900 opacity-70 line-through font-semibold">
                            {userAnswer !== undefined ? q.options[userAnswer] : 'Sin responder'}
                          </span>
                        </div>

                        <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                          <span className="text-xs font-bold text-emerald-800 uppercase tracking-wider block mb-1">Respuesta correcta</span>
                          <span className="text-emerald-900 font-bold">
                            {q.options[q.correctOptionIndex]}
                          </span>
                        </div>

                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 mt-4">
                          <span className="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-2">Normativa / Origen</span>
                          <p className="text-sm text-slate-700 font-medium leading-relaxed">{q.explanation}</p>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // Componente Principal de la Aplicación (App)
    function App() {
      const [hasStarted, setHasStarted] = useState(false);
      const [showDirectCheckout, setShowDirectCheckout] = useState(false);
      const [quizState, setQuizState] = useState({
        currentQuestionIndex: 0,
        answers: {},
        isFinished: false
      });
      const [stagingAnswer, setStagingAnswer] = useState(undefined);

      const handleStart = () => {
        setHasStarted(true);
      };

      const handleRestart = () => {
        setHasStarted(false);
        setQuizState({
          currentQuestionIndex: 0,
          answers: {},
          isFinished: false
        });
        setStagingAnswer(undefined);
      };

      const handleAnswerSubmit = (optionIndex) => {
        const currentQuestion = questions[quizState.currentQuestionIndex];
        const newAnswers = { ...quizState.answers, [currentQuestion.id]: optionIndex };
        
        if (quizState.currentQuestionIndex < questions.length - 1) {
          setQuizState({
            ...quizState,
            answers: newAnswers,
            currentQuestionIndex: quizState.currentQuestionIndex + 1
          });
          setStagingAnswer(undefined);
        } else {
          setQuizState({
            ...quizState,
            answers: newAnswers,
            isFinished: true
          });
        }
      };

      if (showDirectCheckout) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <CheckoutForm 
              onSuccess={(paymentLink) => { window.location.href = paymentLink; }} 
              onCancel={() => setShowDirectCheckout(false)} 
            />
          </div>
        );
      }

      if (!hasStarted) {
        return (
          <WelcomeScreen 
            onStart={handleStart} 
            onGetLicense={() => setShowDirectCheckout(true)} 
          />
        );
      }

      if (quizState.isFinished) {
        return (
          <ResultsScreen 
            questions={questions} 
            answers={quizState.answers} 
            onRestart={handleRestart} 
          />
        );
      }

      return (
        <QuizScreen 
          question={questions[quizState.currentQuestionIndex]}
          currentIndex={quizState.currentQuestionIndex}
          totalQuestions={questions.length}
          onAnswer={handleAnswerSubmit}
          onSelectOption={setStagingAnswer}
          selectedAnswer={stagingAnswer}
        />
      );
    }

    // Renderizado en la raíz del documento
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
